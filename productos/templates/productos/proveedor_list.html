{% extends 'productos/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Proveedores</h2>
    <a href="{% url 'proveedor_create' %}" class="btn btn-primary">+ Nuevo Proveedor</a>
</div>
<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr><th>Empresa</th><th>Ciudad</th><th>Productos</th><th>Acciones</th></tr>
    </thead>
    <tbody>
    {% for p in proveedores %}
        <tr>
            <td>{{ p.nombre_empresa }}</td>
            <td>{{ p.ciudad }}</td>
            <td>{{ p.productos.count }}</td>
            <td>
                <a href="{% url 'proveedor_edit' p.pk %}" class="btn btn-sm btn-warning">Editar</a>
                <a href="{% url 'proveedor_delete' p.pk %}" class="btn btn-sm btn-danger">Eliminar</a>
            </td>
        </tr>
    {% empty %}
        <tr><td colspan="4" class="text-center">No hay proveedores aún.</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
